services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lofify
      POSTGRES_PASSWORD: lofify
      POSTGRES_DB: lofify
    ports:
      - '5433:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lofify']
      interval: 5s
      timeout: 5s
      retries: 10

  otel-lgtm:
    image: grafana/otel-lgtm:latest
    restart: unless-stopped
    ports:
      - '3000:3000'   # Grafana
      - '4317:4317'   # OTLP gRPC
      - '4318:4318'   # OTLP HTTP

  backend:
    image: node:24-bookworm-slim
    working_dir: /app
    command: sh -c "apt-get update && apt-get install -y --no-install-recommends ffmpeg ca-certificates && rm -rf /var/lib/apt/lists/* && corepack enable && pnpm install && pnpm --filter ./packages/backend dev"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://lofify:lofify@postgres:5432/lofify}
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 4000
      LIBRARY_PATH: /music
      PLAYBACK_SIGNING_SECRET: ${PLAYBACK_SIGNING_SECRET:-dev-secret}
      TRANSCODE_MAX_PARALLEL: ${TRANSCODE_MAX_PARALLEL:-4}
      TRANSCODE_CACHE_MAX_BYTES: ${TRANSCODE_CACHE_MAX_BYTES:-1073741824}
      TRANSCODE_CACHE_TTL_SECONDS: ${TRANSCODE_CACHE_TTL_SECONDS:-3600}
      TRANSCODE_TMPDIR: /transcode
      TRANSCODE_BAKE_DIR: /bakes
      TRANSCODE_BAKE_PARALLEL: ${TRANSCODE_BAKE_PARALLEL:-1}
      PLAYBACK_CACHE_DIR: /playback-cache
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-lgtm:4318
      OTEL_SERVICE_NAME: lofify-backend
    ports:
      - '4000:4000'
    volumes:
      - .:/app
      - backend-node-modules:/app/node_modules
      - ${LIBRARY_PATH:-./music}:/music:ro
      - ./transcode-debug:/transcode
      - bake-cache:/bakes
      - playback-cache:/playback-cache
    depends_on:
      postgres:
        condition: service_healthy
      otel-lgtm:
        condition: service_started

  web:
    image: node:24-bookworm-slim
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm --filter ./packages/web dev --host 0.0.0.0"
    environment:
      VITE_GRAPHQL_URL: http://localhost:4000/graphql
      VITE_GRAPHQL_STREAM_URL: http://localhost:4000/graphql/stream
    ports:
      - '5173:5173'
    volumes:
      - .:/app
      - web-node-modules:/app/node_modules

volumes:
  postgres-data:
  backend-node-modules:
  web-node-modules:
  bake-cache:
  playback-cache:
