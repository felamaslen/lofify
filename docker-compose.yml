services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lofify
      POSTGRES_PASSWORD: lofify
      POSTGRES_DB: lofify
    ports:
      - '5433:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lofify']
      interval: 5s
      timeout: 5s
      retries: 10

  otel-lgtm:
    image: grafana/otel-lgtm:latest
    restart: unless-stopped
    ports:
      - '3000:3000' # Grafana
      - '4317:4317' # OTLP gRPC
      - '4318:4318' # OTLP HTTP

  backend:
    # Build from the local Dockerfile so dev and prod share the same base image, apt deps, and pinned ffmpeg 8.1.2. Source is mounted over `/app` and the command is overridden to run the tsx-watch dev server instead of the prod start command.
    build:
      context: .
      target: backend
    command: pnpm --filter ./packages/backend dev
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://lofify:lofify@postgres:5432/lofify}
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 4000
      CORS_ALLOW_ORIGINS: '*'
      DB_QUERY_LOG: ${DB_QUERY_LOG}
      LIBRARY_PATH: /music
      NODE_ENV: development
      PLAYBACK_SIGNING_SECRET: ${PLAYBACK_SIGNING_SECRET:-dev-secret}
      TRANSCODE_MAX_PARALLEL: ${TRANSCODE_MAX_PARALLEL:-4}
      DISK_CACHE_DIR: /disk-cache
      DISK_CACHE_MAX_BYTES: 1073741824
      # The browser-facing origin, used to build artwork/asset URLs and the shared-link Open Graph
      # tags. Pointed at the web dev origin so those URLs resolve through Vite's proxy (same origin
      # as the page). Switch to https://localhost:5173 under DEV_HTTPS=1, or to your tunnel URL
      # (e.g. an ngrok https URL) when testing link unfurls externally.
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:5173}
      # Dev shell the /share route fetches to inject Open Graph metadata into (the web client proxies
      # /share here). The web service serves it; reachable by service name on the compose network.
      WEB_DEV_SHELL_URL: ${WEB_DEV_SHELL_URL:-http://web:5173/index.html}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-lgtm:4318
      OTEL_SERVICE_NAME: lofify-backend
    ports:
      - '4000:4000'
    volumes:
      - .:/app
      - backend-node-modules:/app/node_modules
      - ${LIBRARY_PATH:-./music}:/music:ro
      # The volume keeps its historical name (renaming a named volume would orphan the cached data); only the mount path is /disk-cache.
      - playback-cache:/disk-cache
    depends_on:
      postgres:
        condition: service_healthy
      otel-lgtm:
        condition: service_started

  artwork-worker:
    build:
      context: packages/artwork-worker
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://lofify:lofify@postgres:5432/lofify}
      DISK_CACHE_DIR: /disk-cache
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-lgtm:4318
    volumes:
      - playback-cache:/disk-cache
    depends_on:
      postgres:
        condition: service_healthy
      otel-lgtm:
        condition: service_started
    restart: unless-stopped

  web:
    image: node:24-bookworm-slim
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm --filter ./packages/web dev --host 0.0.0.0"
    environment:
      # Relative URLs so the browser talks to the dev server's own origin; Vite proxies these paths
      # (and /play, /artwork, /asset) to the backend (see BACKEND_PROXY_TARGET). Same origin means no
      # CORS and nothing blocked as mixed content when DEV_HTTPS is on.
      VITE_GRAPHQL_URL: ${GRAPHQL_URL:-/graphql}
      VITE_GRAPHQL_STREAM_URL: ${GRAPHQL_STREAM_URL:-/graphql/stream}
      BACKEND_PROXY_TARGET: ${BACKEND_PROXY_TARGET:-http://backend:4000}
      # Set DEV_HTTPS=1 to serve the dev client over HTTPS (self-signed) on 5173 — needed for the
      # secure-context Web Share / Clipboard APIs the track Share action uses. When you do, also set
      # PUBLIC_URL=https://localhost:5173 (below) so artwork URLs match the HTTPS origin.
      DEV_HTTPS: ${DEV_HTTPS:-}
    ports:
      - '5173:5173'
    volumes:
      - .:/app
      - web-node-modules:/app/node_modules

volumes:
  postgres-data:
  backend-node-modules:
  web-node-modules:
  playback-cache:
