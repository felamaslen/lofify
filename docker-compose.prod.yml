services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lofify
      POSTGRES_PASSWORD: lofify
      POSTGRES_DB: lofify
    volumes:
      - ./var/db:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lofify']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ${IMAGE:-felamaslen/lofify}:${TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://lofify:lofify@postgres:5432/lofify}
      BACKEND_HOST: ${BACKEND_HOST:-0.0.0.0}
      BACKEND_PORT: 4002
      LIBRARY_PATH: ${LIBRARY_PATH:-/music}
      DISK_CACHE_DIR: /playback-cache/lofify
    ports:
      - '4002:4002'
    volumes:
      - ${LIBRARY_MOUNT}:/music:ro
      - playback-cache:/playback-cache
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  playback-cache:
    driver: local
    driver_opts:
      type: nfs
      o: 'addr=__NFS_HOST__,rw,nfsvers=4,noatime'
      device: ':__NFS_PATH__'
