services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lofify
      POSTGRES_PASSWORD: lofify
      POSTGRES_DB: lofify
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lofify']
      interval: 5s
      timeout: 5s
      retries: 10

  otel-lgtm:
    image: grafana/otel-lgtm:latest
    restart: unless-stopped
    ports:
      - '3000:3000'

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 4000
      PLAYBACK_SIGNING_SECRET: ${PLAYBACK_SIGNING_SECRET}
      TRANSCODE_MAX_PARALLEL: ${TRANSCODE_MAX_PARALLEL:-2}
      TRANSCODE_CACHE_MAX_BYTES: ${TRANSCODE_CACHE_MAX_BYTES:-1073741824}
      TRANSCODE_CACHE_TTL_SECONDS: ${TRANSCODE_CACHE_TTL_SECONDS:-3600}
      SCANNER_CONTROL_URL: http://scanner:7000
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-lgtm:4318
      OTEL_SERVICE_NAME: lofify-backend
    ports:
      - '4000:4000'
    volumes:
      - ${LIBRARY_PATH}:/music:ro
    depends_on:
      postgres:
        condition: service_healthy

  ui:
    build:
      context: .
      dockerfile: Dockerfile
      target: ui
    restart: unless-stopped
    ports:
      - '8080:80'
    depends_on:
      - backend

  scanner:
    build:
      context: .
      dockerfile: Dockerfile
      target: scanner
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      LIBRARY_PATH: /music
    volumes:
      - ${LIBRARY_PATH}:/music:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
