<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Lofify" />
    <title>Lofify</title>
    <script>
      // Apply the saved colour scheme before first paint to avoid a flash of the
      // wrong theme. Mirrors the logic in src/state/theme.tsx.
      (function () {
        try {
          var saved = localStorage.getItem('lofify.app.theme');
          var theme = saved === 'light' || saved === 'dark' ? saved : 'system';
          var dark =
            theme === 'dark' ||
            (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.classList.toggle('dark', dark);
          if (dark) document.querySelector('meta[name="theme-color"]').content = '#0f1115';
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
